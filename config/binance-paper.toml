# Binance spot paper-trading config — real feed, simulated order
# egress. Calibration values come from `mm-record-live` + `mm-calibrate`
# on 3 minutes of live BTCUSDT data on 2026-04-17 (see
# `config/btcusdt-binance-live.toml` for the generator output).
#
# Risk limits are sized against the $2 account balance the operator
# confirmed; even a paper run wouldn't touch real funds here, but
# we keep the numbers realistic so behaviour mirrors what a tiny
# live deploy would see.

symbols = ["BTCUSDT"]
mode = "paper"
dashboard_port = 9090
checkpoint_path = "data/checkpoint-paper.json"
log_file = ""

[exchange]
exchange_type = "binance"
rest_url = "https://api.binance.com"
# Base WS host only — the connector appends `/stream?streams=…`
# so a trailing `/ws` here produces a 404. Verified 2026-04-17.
ws_url = "wss://stream.binance.com:9443"
# api_key / api_secret come from MM_API_KEY / MM_API_SECRET env vars.

[market_maker]
strategy = "avellaneda_stoikov"

# Calibrated on live Binance BTCUSDT (181 s, 1800 book obs, 7563 trades).
# σ is per-second realised vol from mid log-returns; κ is trade
# arrival rate per second. γ stays at the reference 0.1 — it's a
# risk preference and should be tuned per capital, not from flow.
gamma = "0.1000"
kappa = "42.3124"
sigma = "0.000053"
time_horizon_secs = 300

num_levels = 3
order_size = "0.000251"   # ≈ 19 USDT per order at 75k — well under $2 so no real fill risk
refresh_interval_ms = 500
min_spread_bps = "3"
max_distance_bps = "80"

momentum_enabled = true
momentum_window = 200
market_resilience_enabled = true
otr_enabled = true
hma_enabled = true
hma_window = 9

# $2 balance → no listen-key complexity, no cross-venue bits.
user_stream_enabled = false
inventory_drift_tolerance = "0.00001"
inventory_drift_auto_correct = false

# Epic 30 — online AdaptiveTuner. Off by default; flipping to
# true adds a slow-moving γ multiplier layer fed by rolling
# fill rate + realised spread capture + adverse selection.
adaptive_enabled = true

# Epic 31 — auto-apply per-class template at startup based on
# the detected PairClass. For BTCUSDT this folds in the
# MajorSpot template's tight γ / min_spread defaults.
apply_pair_class_template = true

[risk]
# Dollar-size lanes are tiny by design: the account only has ~$2,
# so the hard exposure guard sits well below it so any accidental
# real-order path trips the brake before the account is drained.
max_inventory = "0.0001"            # 0.0001 BTC ≈ 7.5 USDT
max_exposure_quote = "10"           # 10 USDT
max_drawdown_quote = "2"            # full account = pull the cord
inventory_skew_factor = "1.0"
max_spread_bps = "200"
stale_book_timeout_secs = 10
max_order_size = "0.0005"           # per-order hard cap (27 USDT notional on current price ≈ no real fill possible)
max_daily_volume_quote = "100"
max_hourly_volume_quote = "30"

[kill_switch]
# Paper run — these caps would still stop the engine if it ever
# strayed, but the main safety net is the OrderManager paper gate.
# max_position_value is in quote-currency terms; at ~$75k spot one
# 0.00025 BTC paper fill is ≈ $19, so a $10 cap tripped on the
# first fill. Widened for the paper run; tighten for real live.
daily_loss_limit = "50"
daily_loss_warning = "25"
max_position_value = "500"
max_message_rate = 50
max_consecutive_errors = 10

[sla]
max_spread_bps = "100"
min_depth_quote = "2000"
min_uptime_pct = "95"
two_sided_required = true
max_requote_secs = 5
min_order_rest_secs = 3

[toxicity]
vpin_bucket_size = "50000"
vpin_num_buckets = 50
vpin_threshold = "0.7"
kyle_window = 100
adverse_selection_lookback_ms = 3000
autotune_enabled = true

[listing_sniper]
enabled = false
scan_interval_secs = 300
alert_on_discovery = true
