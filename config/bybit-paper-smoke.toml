# Bybit V5 spot paper smoke — real feed, paper egress.
# Calibrated on `data/recorded/bybit-btcusdt.jsonl` (30s: 1410 book, 1056 trades).
# This is the runtime validation config, not a production template.

symbols = ["BTCUSDT"]
mode = "paper"
dashboard_port = 9091
checkpoint_path = "data/checkpoint-bybit-smoke.json"
log_file = ""

[exchange]
exchange_type = "bybit"
rest_url = "unused"
ws_url = "unused"

[market_maker]
strategy = "avellaneda_stoikov"
gamma = "0.0800"
kappa = "35.0000"
sigma = "0.00006"
time_horizon_secs = 300
num_levels = 3
order_size = "0.0001"
refresh_interval_ms = 500
min_spread_bps = "3"
max_distance_bps = "80"
momentum_enabled = true
momentum_window = 200
market_resilience_enabled = true
otr_enabled = false
hma_enabled = true
hma_window = 9
user_stream_enabled = false
inventory_drift_tolerance = "0.00001"
inventory_drift_auto_correct = false

[risk]
# Bybit UNIFIED account returns total equity spread across coins;
# the USDT wallet balance specifically is $0, so the engine's
# ExposureManager starts with peak=0 and any paper mark-price
# delta trips drawdown. Widening the guard is the right call for
# a paper smoke — the paper OrderManager guard is what actually
# prevents real orders, not this field.
max_inventory = "0.0001"
max_exposure_quote = "1000"
max_drawdown_quote = "1000"
inventory_skew_factor = "1.0"
max_spread_bps = "200"
stale_book_timeout_secs = 10
max_order_size = "0.0005"
max_daily_volume_quote = "100"
max_hourly_volume_quote = "30"

[kill_switch]
daily_loss_limit = "2"
daily_loss_warning = "1"
max_position_value = "10"
max_message_rate = 50
max_consecutive_errors = 10

[sla]
max_spread_bps = "100"
min_depth_quote = "2000"
min_uptime_pct = "95"
two_sided_required = true
max_requote_secs = 5
min_order_rest_secs = 3

[toxicity]
vpin_bucket_size = "50000"
vpin_num_buckets = 50
vpin_threshold = "0.7"
kyle_window = 100
adverse_selection_lookback_ms = 3000
autotune_enabled = true

[listing_sniper]
enabled = false
scan_interval_secs = 300
alert_on_discovery = true
