# Bybit V5 linear perpetual paper-trading config. Sister file to
# bybit-paper.toml (spot). Used in the 3-venue smoke run alongside
# binance-paper (spot) and binance-perp-paper (linear perp).

symbols = ["BTCUSDT"]
mode = "paper"
dashboard_port = 9092                               # distinct port
checkpoint_path = "data/checkpoint-bybit-perp.json"
log_file = ""

[exchange]
exchange_type = "bybit"
# product selects the linear-perp category on Bybit V5. Without
# this field the engine defaults to spot.
product = "linear_perp"
rest_url = "unused"       # Bybit rest_url ignored — hardcoded in connector
ws_url = "unused"
# api_key / api_secret from env.

[market_maker]
strategy = "avellaneda_stoikov"

# Conservative placeholders — Bybit perp flow differs from spot.
# Calibrate with mm-record-live --venue bybit --product linear_perp
# before trusting for anything beyond smoke.
gamma = "0.12"
kappa = "25"
sigma = "0.0001"
time_horizon_secs = 300

num_levels = 3
order_size = "0.001"
refresh_interval_ms = 500
min_spread_bps = "4"
max_distance_bps = "100"

momentum_enabled = true
momentum_window = 200
market_resilience_enabled = true
otr_enabled = true
hma_enabled = true
hma_window = 9

user_stream_enabled = false
inventory_drift_tolerance = "0.00005"
inventory_drift_auto_correct = false
adaptive_enabled = true
apply_pair_class_template = true

[risk]
max_inventory = "0.005"
max_exposure_quote = "100"
max_drawdown_quote = "10"
inventory_skew_factor = "1.0"
max_spread_bps = "200"
stale_book_timeout_secs = 10
max_order_size = "0.002"
max_daily_volume_quote = "500"
max_hourly_volume_quote = "150"

[kill_switch]
daily_loss_limit = "100"
daily_loss_warning = "50"
max_position_value = "2000"
max_message_rate = 60
max_consecutive_errors = 10

[sla]
max_spread_bps = "100"
min_depth_quote = "5000"
min_uptime_pct = "95"
two_sided_required = true
max_requote_secs = 5
min_order_rest_secs = 3

[toxicity]
vpin_bucket_size = "100000"
vpin_num_buckets = 50
vpin_threshold = "0.7"
kyle_window = 100
adverse_selection_lookback_ms = 3000
autotune_enabled = true

[listing_sniper]
enabled = false
scan_interval_secs = 300
alert_on_discovery = true

[margin]
refresh_interval_secs = 5
widen_ratio = "0.50"
reduce_ratio = "0.65"
stop_ratio = "0.80"
cancel_ratio = "0.90"
max_stale_secs = 30
default_mode = "isolated"
default_leverage = 5
default_maintenance_margin_rate = "0.005"
