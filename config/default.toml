# Market Maker Configuration

symbols = ["BTCUSDT"]
mode = "live"                   # "live" or "paper"
dashboard_port = 9090           # HTTP dashboard (0 = disabled)
checkpoint_path = "data/checkpoint.json"
log_file = ""                   # Empty = stdout only; "logs/mm.log" for file

# Dashboard users (or use MM_ADMIN_KEY env for default admin)
# API keys should be in env vars in production, not here!
#
# [[users]]
# id = "admin-1"
# name = "MM Operator"
# role = "admin"                # admin | operator | viewer
# api_key = "set-via-env-var"
#
# [[users]]
# id = "client-acme"
# name = "Acme Token Project"
# role = "viewer"
# api_key = "client-key-here"
# allowed_symbols = ["ACMEUSDT"]

[exchange]
# Valid values: "custom", "binance", "binance_testnet", "bybit", "bybit_testnet",
# "hyper_liquid", "hyper_liquid_testnet"
exchange_type = "custom"
rest_url = "http://localhost:8080"    # Only used for custom exchange
ws_url = "ws://localhost:8080/ws/v1"  # Only used for custom exchange
# api_key = "your-api-key"
# api_secret = "your-api-secret"
#
# HyperLiquid note: set `MM_API_SECRET` to the hex-encoded 32-byte wallet
# private key (0x prefix optional). `api_key` is ignored — the Ethereum
# address is derived from the private key. REST/WS URLs are baked into the
# connector and the values above are ignored for this venue.

[market_maker]
# Strategy: "avellaneda_stoikov", "glft", or "grid"
strategy = "avellaneda_stoikov"

# Avellaneda-Stoikov / GLFT parameters
gamma = "0.1"           # Risk aversion (higher = wider spread)
kappa = "1.5"           # Order arrival intensity
sigma = "0.02"          # Default volatility (overridden by live estimate)
time_horizon_secs = 300

num_levels = 3          # Quote levels per side
order_size = "0.001"    # Base asset per order
refresh_interval_ms = 500
min_spread_bps = "5"
max_distance_bps = "100"

momentum_enabled = true
momentum_window = 200

# Event-driven Market Resilience detector. Widens the book
# after a just-happened liquidity shock and trips kill-switch
# L1 when the score stays under 0.3 for >=3s.
market_resilience_enabled = true
# Regulatory Order-to-Trade Ratio counter. MiCA compliance
# signal — emit periodic snapshots into the audit trail.
otr_enabled = true
# Hull Moving Average alpha component on mid-price updates.
# Adds a 5th input to MomentumSignals::alpha().
hma_enabled = true
hma_window = 9

# Binance listen-key user-data stream. Merges out-of-band
# fills (REST fallback, partial fills after WS-API envelope,
# manual UI orders, RFQ/OTC) and BalanceUpdate events into
# the engine's run loop. LEAVE ON for live Binance spot MM
# — fills would otherwise be silently dropped until the
# 60 s reconcile cycle.
user_stream_enabled = true

# Inventory-vs-wallet drift reconciliation. On every reconcile
# cycle, compares the wallet delta since engine start against
# `InventoryManager.inventory()` and alerts when the mismatch
# exceeds the tolerance. Catches missed fills that slip past
# the listen-key stream. `tolerance` is in base-asset units;
# widen it if the venue takes fees in the base asset.
inventory_drift_tolerance = "0.0001"
# Alert-only by default. Flip to true to auto-reset the
# tracker to the wallet delta on drift — use only when the
# drift source is known (listen-key gap, not a fill-routing
# bug).
inventory_drift_auto_correct = false

[risk]
max_inventory = "0.1"
max_exposure_quote = "10000"
max_drawdown_quote = "500"
inventory_skew_factor = "1.0"
max_spread_bps = "500"
stale_book_timeout_secs = 10
max_order_size = "0.01"             # Max single order in base asset (0 = unlimited)
max_daily_volume_quote = "100000"   # Max 24h volume in quote asset (0 = unlimited)
max_hourly_volume_quote = "20000"   # Max 1h volume in quote asset (0 = unlimited)

[kill_switch]
daily_loss_limit = "1000"
daily_loss_warning = "500"
max_position_value = "50000"
max_message_rate = 100
max_consecutive_errors = 10

[sla]
max_spread_bps = "100"
min_depth_quote = "2000"
min_uptime_pct = "95"
two_sided_required = true
max_requote_secs = 5
min_order_rest_secs = 3

[toxicity]
vpin_bucket_size = "50000"
vpin_num_buckets = 50
vpin_threshold = "0.7"
kyle_window = 100
adverse_selection_lookback_ms = 3000
autotune_enabled = true
