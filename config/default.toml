# Market Maker Configuration

symbols = ["BTCUSDT"]
mode = "live"                   # "live" or "paper"
dashboard_port = 9090           # HTTP dashboard (0 = disabled)
checkpoint_path = "data/checkpoint.json"
log_file = ""                   # Empty = stdout only; "logs/mm.log" for file

# Dashboard users (or use MM_ADMIN_KEY env for default admin)
# API keys should be in env vars in production, not here!
#
# [[users]]
# id = "admin-1"
# name = "MM Operator"
# role = "admin"                # admin | operator | viewer
# api_key = "set-via-env-var"
#
# [[users]]
# id = "client-acme"
# name = "Acme Token Project"
# role = "viewer"
# api_key = "client-key-here"
# allowed_symbols = ["ACMEUSDT"]

[exchange]
# Valid values: "custom", "binance", "binance_testnet", "bybit", "bybit_testnet",
# "hyper_liquid", "hyper_liquid_testnet"
exchange_type = "custom"
rest_url = "http://localhost:8080"    # Only used for custom exchange
ws_url = "ws://localhost:8080/ws/v1"  # Only used for custom exchange
# api_key = "your-api-key"
# api_secret = "your-api-secret"
#
# HyperLiquid note: set `MM_API_SECRET` to the hex-encoded 32-byte wallet
# private key (0x prefix optional). `api_key` is ignored — the Ethereum
# address is derived from the private key. REST/WS URLs are baked into the
# connector and the values above are ignored for this venue.

[market_maker]
# Strategy: "avellaneda_stoikov", "glft", or "grid"
strategy = "avellaneda_stoikov"

# Avellaneda-Stoikov / GLFT parameters
gamma = "0.1"           # Risk aversion (higher = wider spread)
kappa = "1.5"           # Order arrival intensity
sigma = "0.02"          # Default volatility (overridden by live estimate)
time_horizon_secs = 300

num_levels = 3          # Quote levels per side
order_size = "0.001"    # Base asset per order
refresh_interval_ms = 500
min_spread_bps = "5"
max_distance_bps = "100"

momentum_enabled = true
momentum_window = 200

# Event-driven Market Resilience detector. Widens the book
# after a just-happened liquidity shock and trips kill-switch
# L1 when the score stays under 0.3 for >=3s.
market_resilience_enabled = true
# Regulatory Order-to-Trade Ratio counter. MiCA compliance
# signal — emit periodic snapshots into the audit trail.
otr_enabled = true
# Hull Moving Average alpha component on mid-price updates.
# Adds a 5th input to MomentumSignals::alpha().
hma_enabled = true
hma_window = 9

# Binance listen-key user-data stream. Merges out-of-band
# fills (REST fallback, partial fills after WS-API envelope,
# manual UI orders, RFQ/OTC) and BalanceUpdate events into
# the engine's run loop. LEAVE ON for live Binance spot MM
# — fills would otherwise be silently dropped until the
# 60 s reconcile cycle.
user_stream_enabled = true

# Inventory-vs-wallet drift reconciliation. On every reconcile
# cycle, compares the wallet delta since engine start against
# `InventoryManager.inventory()` and alerts when the mismatch
# exceeds the tolerance. Catches missed fills that slip past
# the listen-key stream. `tolerance` is in base-asset units;
# widen it if the venue takes fees in the base asset.
inventory_drift_tolerance = "0.0001"
# Alert-only by default. Flip to true to auto-reset the
# tracker to the wallet delta on drift — use only when the
# drift source is known (listen-key gap, not a fill-routing
# bug).
inventory_drift_auto_correct = false

[risk]
max_inventory = "0.1"
max_exposure_quote = "10000"
max_drawdown_quote = "500"
inventory_skew_factor = "1.0"
max_spread_bps = "500"
stale_book_timeout_secs = 10
max_order_size = "0.01"             # Max single order in base asset (0 = unlimited)
max_daily_volume_quote = "100000"   # Max 24h volume in quote asset (0 = unlimited)
max_hourly_volume_quote = "20000"   # Max 1h volume in quote asset (0 = unlimited)

[kill_switch]
daily_loss_limit = "1000"
daily_loss_warning = "500"
max_position_value = "50000"
max_message_rate = 100
max_consecutive_errors = 10

[sla]
max_spread_bps = "100"
min_depth_quote = "2000"
min_uptime_pct = "95"
two_sided_required = true
max_requote_secs = 5
min_order_rest_secs = 3

[toxicity]
vpin_bucket_size = "50000"
vpin_num_buckets = 50
vpin_threshold = "0.7"
kyle_window = 100
adverse_selection_lookback_ms = 3000
autotune_enabled = true

[listing_sniper]
enabled = false                 # periodic venue scanning for new listings
scan_interval_secs = 300        # scan every 5 minutes
alert_on_discovery = true       # Telegram alert on new/removed symbols

# ─── Optional feature configs ─────────────────────────────────
# Sections below are OFF by default (either the block is absent,
# or `enabled = false`). Uncomment and tune per deployment. Every
# section is validated at boot — bad values hard-fail in live mode
# and warn-only in paper mode.

# [protections]
# Per-pair guard stack (22W-1). Any sub-block can appear on its
# own; a missing block disables that guard. Lock semantics:
# `refresh_quotes` short-circuits while the pair is locked — no
# new quotes placed, existing orders cancel via the normal
# pathway when the operator escalates.
#
# [protections.stoploss_guard]
# window_secs  = 600             # rolling window to count stop events in
# max_stops    = 3               # ≥ this many stops in the window → lock
# lockout_secs = 1800            # how long the lockout lasts after trip
#
# [protections.cooldown]
# duration_secs = 120            # mandatory pause after every stop event
#
# [protections.max_drawdown]
# max_drawdown_quote = "250"     # peak-to-trough in quote asset
# lockout_secs       = 3600
# recovery_fraction  = "0.95"    # early unlock at 95% of peak recovered
#
# [protections.low_profit_pairs]
# window_secs    = 86400         # 24h rolling window
# min_pnl_quote  = "50"          # demote below this
# min_trades     = 30
# lockout_secs   = 21600         # 6h sideline

# [portfolio_var]
# Portfolio-wide parametric Gaussian VaR guard (22W-2). Engine
# samples PnL every 30 s into a rolling `max_samples` window and
# trips kill-switch L2 when VaR crosses `var_limit_*`. Absent
# limits → guard is observability-only.
#
# var_limit_95 = "500"           # 1-tail 95% VaR cap in quote asset
# var_limit_99 = "1000"          # 1-tail 99% VaR cap
# max_samples  = 1440            # 12h at 30s cadence
# min_samples  = 30              # warm-up threshold

# [paper_fill]
# Paper-mode fill simulation (`ProbabilisticFiller`). Takes
# effect ONLY when `mode = "paper"`. Without this section paper
# mode fills every crossing trade deterministically — useful for
# unit/smoke, misleading for capacity planning. Seed is derived
# from the symbol so runs are reproducible.
#
# prob_fill_on_touch = "0.6"     # fraction of touches that actually fill
# prob_slippage      = "0.05"    # chance of adverse slippage on a fill
# slippage_bps       = "1"       # slippage magnitude in bps of quote price
# latency_ms         = 5         # simulated round-trip latency

# [ab_split]
# A/B split parameter tests (23-P2-1). Engine applies the active
# variant's multipliers to `gamma`/`spread`/`order_size` every
# tick and tracks per-variant PnL. Pick winner via `/api/v1/...`
# (see operations.md). Modes: "time_based" alternates every
# `period_ticks`; "symbol_based" partitions by symbol hash.
#
# mode         = "time_based"
# period_ticks = 60
#
# [ab_split.variant_a]
# name        = "baseline"
# gamma_mult  = "1"
# spread_mult = "1"
# size_mult   = "1"
#
# [ab_split.variant_b]
# name        = "tighter"
# gamma_mult  = "0.7"
# spread_mult = "0.8"
# size_mult   = "1.2"

# [execution]
# Kill-switch L4 flatten execution algo (22A-3). Replaces the
# hardcoded TWAP 60 s / 10 slices / 5 bps defaults. Bigger
# inventory or thinner books typically want duration 300-1800 s.
#
# algo               = "twap"
# duration_secs      = 300
# num_slices         = 20
# aggressiveness_bps = "5"        # 0 = at mid, 10+ = passive limit

# [margin]
# Perp margin guard (Epic 40.4). Polls `account_margin_info()`
# every `refresh_interval_secs` and escalates kill switch when
# `margin_ratio` crosses a threshold. `reduce_ratio` triggers
# proactive reduce-only IoC slices (Phase IV P0). Per-symbol
# overrides go under `[margin.per_symbol.BTCUSDT]`.
#
# refresh_interval_secs            = 5
# widen_ratio                      = "0.50"
# reduce_ratio                     = "0.65"   # proactive reduce here
# stop_ratio                       = "0.80"
# cancel_ratio                     = "0.90"
# max_stale_secs                   = 30
# default_mode                     = "isolated"  # or "cross"
# default_leverage                 = 5
# default_maintenance_margin_rate  = "0.005"     # fallback MMR
#
# [margin.per_symbol.BTCUSDT]
# mode     = "isolated"
# leverage = 10

# [funding_arb]
# Funding-arb driver (Epic 2). Atomic spot-maker + perp-taker
# pair dispatch when annualised funding rate ≥ `min_rate_annual_pct`.
# Pair-break fires a compensating reduce-only market order (see
# docs/guides/funding-arb.md for the full flow). Configure hedge
# venue via `[hedge]`.
#
# enabled               = false
# tick_interval_secs    = 60
# min_rate_annual_pct   = "10"
# max_position          = "0.1"
# max_basis_bps         = "50"

# [stat_arb]
# Cointegrated pair driver (Epic B). Regresses Y=α+βX, runs a
# Kalman filter on (α,β), trades z-score reversion. Y/X must both
# feed the engine (primary + hedge connectors). Pair screener in
# `[pair_screener]` finds cointegrated pairs offline; operators
# promote the ones they trust into this section.
#
# enabled                 = false
# tick_interval_secs      = 60
# y_symbol                = "ETHUSDT"
# x_symbol                = "SOLUSDT"
# zscore_window           = 120
# zscore_entry            = "2"
# zscore_exit             = "0.5"
# kalman_transition_var   = "0.000001"
# kalman_observation_var  = "0.001"
# leg_notional_usd        = "1000"

# [xemm]
# XEMM cross-exchange executor (22W-5). Takes effect when
# `strategy = "cross_exchange"` AND a hedge connector is
# configured. `max_slippage_bps` rejects a hedge fill that would
# violate the band; `min_edge_bps` flags (does NOT reject) thin
# crosses.
#
# enabled         = false
# max_slippage_bps = "20"
# min_edge_bps     = "0"
