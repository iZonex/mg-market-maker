# Cross-exchange MM paper config.
#
# One process, two venues, one dashboard — the correct shape for
# cross-exchange market making (make on A, hedge on B).
#
#   PRIMARY (maker) = Binance spot BTCUSDT
#   HEDGE   (taker) = Bybit linear perp BTCUSDT
#
# Strategy: `cross_exchange`. Engine posts maker quotes on Binance
# spot; any fill triggers an immediate IoC hedge on Bybit perp
# via the `XemmExecutor` slippage-band gate.
#
# Dashboard on :9090 shows both legs in one view:
#   - CrossVenuePortfolio: BTC +x (Binance +y · Bybit -z)
#   - BasisMonitor: bps spread between venues
#   - PerLegPnl + PerLegInventoryChart: which venue sources PnL
#   - FundingPanel: Bybit perp settlement countdown
#   - KillHeader on every page with 4 kill paths
#
# Paper mode: no real orders hit either venue's wire. Public WS
# feed is live — so all observed behaviour mirrors real market
# data without monetary risk.

symbols = ["BTCUSDT"]
mode = "paper"
dashboard_port = 9090
checkpoint_path = "data/checkpoint-xex-paper.json"
log_file = ""

# ── Primary venue: Binance spot ───────────────────────────────
# exchange + product is all you need. REST + WS URLs are derived
# from (exchange_type, product) by the connector — set them only
# for `exchange_type = "custom"` or to override a testnet URL.
[exchange]
exchange_type = "binance"
product = "spot"

# ── Hedge venue: Bybit linear perp ────────────────────────────
[hedge]
[hedge.exchange]
exchange_type = "bybit"
product = "linear_perp"

[hedge.pair]
primary_symbol = "BTCUSDT"
hedge_symbol = "BTCUSDT"
multiplier = "1"
basis_threshold_bps = "25"   # widen/retreat when basis > 25 bps

[market_maker]
# CrossExchangeStrategy produces maker quotes on primary; the
# XemmExecutor reacts to fills + fires hedge IoCs on the hedge
# connector. See docs/guides/writing-strategies.md §
# "Two strategy execution paths coexist" for the pool vs driver
# distinction — cross_exchange is synchronous, quote-producing.
strategy = "cross_exchange"

gamma = "0.12"
kappa = "30"
sigma = "0.0001"
time_horizon_secs = 300

num_levels = 3
order_size = "0.001"
refresh_interval_ms = 500
min_spread_bps = "4"
max_distance_bps = "100"

momentum_enabled = true
momentum_window = 200
market_resilience_enabled = true
otr_enabled = true
hma_enabled = true
hma_window = 9

user_stream_enabled = false
inventory_drift_tolerance = "0.00005"
inventory_drift_auto_correct = false
adaptive_enabled = true
apply_pair_class_template = true

[risk]
# Exposure headroom sized for 3 levels × 0.001 BTC × ~75k/BTC =
# ~225 USDT per side + hedge leg = ~450 notional. Cap at 1000
# leaves headroom so transient size adjustments don't trip the
# Widen gate during a normal quoting cycle.
max_inventory = "0.005"
max_exposure_quote = "1000"
max_drawdown_quote = "50"
inventory_skew_factor = "1.0"
max_spread_bps = "200"
stale_book_timeout_secs = 10
max_order_size = "0.002"
max_daily_volume_quote = "5000"
max_hourly_volume_quote = "1500"

[kill_switch]
daily_loss_limit = "100"
daily_loss_warning = "50"
max_position_value = "2000"
max_message_rate = 60
max_consecutive_errors = 10

[sla]
max_spread_bps = "100"
min_depth_quote = "5000"
min_uptime_pct = "95"
two_sided_required = true
max_requote_secs = 5
min_order_rest_secs = 3

[toxicity]
vpin_bucket_size = "100000"
vpin_num_buckets = 50
vpin_threshold = "0.7"
kyle_window = 100
adverse_selection_lookback_ms = 3000
autotune_enabled = true

[listing_sniper]
enabled = false
scan_interval_secs = 300
alert_on_discovery = true

# XEMM executor — the reactive hedge layer. Fires on every
# primary fill with a 20 bps slippage band (reject hedge when
# adverse slippage exceeds this). `enabled = true` is the switch
# that turns `XemmExecutor::new` on at engine build time.
[xemm]
enabled = true
max_slippage_bps = "20"
min_edge_bps = "0"

# Margin guard intentionally omitted — primary is spot; the
# hedge is perp but margin polling routes through the PRIMARY
# connector today, which returns "venue does not support margin
# info" on Binance spot and auto-escalates kill to WidenSpreads.
# Until hedge-venue margin polling lands, run without [margin]
# in cross-spot-to-perp setups.

# Binance USDⓈ-M futures as a 3rd venue — now supported in one
# process since the dispatcher keys on (VenueId, VenueProduct)
# instead of VenueId alone. Feeds book/fee/queue snapshots into
# the SOR aggregator + shows up as a third CrossVenuePortfolio
# leg so the operator watches three venues (Binance spot maker,
# Bybit perp hedge, Binance perp signal+SOR candidate) in one
# dashboard.
[[sor_extra_venues]]
symbol = "BTCUSDT"
max_inventory = "0.005"
[sor_extra_venues.exchange]
exchange_type = "binance"
product = "linear_perp"

[paper_fill]
# Realistic paper fills — without this section paper fires every
# crossing trade deterministically. ProbabilisticFiller gives
# 60% touch→fill + 5% slippage chance + 5ms latency so paper PnL
# tracks a backtester's QueueAware simulator.
prob_fill_on_touch = "0.6"
prob_slippage = "0.05"
slippage_bps = "1"
latency_ms = 5
