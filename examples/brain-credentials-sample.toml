# Brain credential store — PR-2k shape.
#
# The brain holds every venue API key the fleet may use. Each
# `[[credentials]]` entry registers an id + which env vars hold
# the actual secrets. Secrets never live in the file itself; a
# stolen copy of this TOML is worthless without brain's env.
#
# On agent register, brain reads the env, builds a
# `PushedCredential`, and pushes it over the TLS control channel.
# Agents store credentials in memory only.
#
# Rotation:
#   1. Issue a fresh key pair at the venue (keep old active).
#   2. Update env var values on the brain host.
#   3. Systemctl restart brain — all connected agents reconnect,
#      receive the fresh push, resume quoting within seconds.
#   4. Deactivate the old key at the venue.

[[credentials]]
id = "binance_spot_main"
exchange = "binance"
product = "spot"
api_key_env = "BINANCE_SPOT_KEY"
api_secret_env = "BINANCE_SPOT_SECRET"
max_notional_quote = "1000"
default_symbol = "BTCUSDT"

[[credentials]]
id = "bybit_perp_hedge"
