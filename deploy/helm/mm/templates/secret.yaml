{{- if .Values.secret.create -}}
# ⚠ When `secret.create: true` the chart materialises credentials
# from values.yaml into a Secret. This is convenient for smoke /
# dev but UNSAFE for production — values leak into `helm history`
# and the Tiller/release backing store. For prod:
#   secret.create: false
#   secret.existingSecretName: <ESO-managed name>
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mm.secretName" . }}
  labels:
    {{- include "mm.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secret.stringData }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end -}}
