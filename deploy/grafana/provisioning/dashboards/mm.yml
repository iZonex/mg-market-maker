# Grafana dashboard provisioner — auto-loads JSON dashboards
# from /var/lib/grafana/dashboards (mounted from
# deploy/grafana/dashboards/ in docker-compose). Drop any
# additional dashboard JSON in that directory and Grafana will
# pick it up on next restart.

apiVersion: 1

providers:
  - name: mm
    orgId: 1
    folder: Market Maker
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
