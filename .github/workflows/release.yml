name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Build mm-server (live engine) + mm-hyperopt (offline
      # parameter tuner) together — both ship in the tarball so
      # operators can run mm-hyperopt against their recorded
      # JSONL without installing a toolchain on the ops box.
      - name: Build release binaries
        run: |
          cargo build --release --target ${{ matrix.target }} --bin mm-server
          cargo build --release --target ${{ matrix.target }} --bin mm-hyperopt
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/mm-server dist/
          cp target/${{ matrix.target }}/release/mm-hyperopt dist/
          cp config/default.toml dist/
          cp -r config/examples dist/examples
          cp docs/guides/crash-recovery.md dist/CRASH_RECOVERY.md
          cd dist && tar czf ../mm-server-${{ matrix.target }}.tar.gz *

      - uses: actions/upload-artifact@v7
        with:
          name: mm-server-${{ matrix.target }}
          path: mm-server-${{ matrix.target }}.tar.gz

  # Multi-arch Docker image pushed to GHCR. Tagged with the git
  # tag (`v1.2.3` → `1.2.3` + `latest`) so operators pull a
  # specific release by tag or `latest` for the most recent.
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Strip the leading `v` from `v1.2.3` → `1.2.3`. Also
          # publish `latest` on non-prerelease tags.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
          labels: |
            org.opencontainers.image.title=MG Market Maker
            org.opencontainers.image.description=Multi-venue market maker
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=proprietary

      - name: Build + push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create Release
    needs: [build, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Compute changelog range
        id: changelog
        run: |
          # Use the previous tag as the baseline if one exists;
          # otherwise use the root commit so the first release
          # still gets a sensible "what changed" body.
          prev=$(git describe --tags --abbrev=0 --match 'v*' HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "range=$prev..${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            ## Release ${{ github.ref_name }}

            Docker image: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}`
            (also `:latest`, `:<major>.<minor>`, `:<major>` for matching semver pins)

            ### Binaries
            Tarballs include `mm-server`, `mm-hyperopt`, sample config
            and the crash-recovery runbook.

            ### What's changed
            (auto-generated from commits in `${{ steps.changelog.outputs.range }}`)
          files: artifacts/**/*.tar.gz
