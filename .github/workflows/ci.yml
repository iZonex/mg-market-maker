name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  otel-feature:
    name: OTel Feature Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Build + clippy with the `otel` feature on mm-server so a
      # regression that only surfaces with the opt-in OpenTelemetry
      # deps (opentelemetry-otlp + tracing-opentelemetry) is caught
      # on every PR — the default build skips these deps entirely.
      - run: cargo build -p mm-server --features otel
      - run: cargo clippy -p mm-server --features otel -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # GOBS-CI — spins a live mm-server + mm-agent stand,
    # deploys rug-detector-composite, runs the Playwright
    # regression suite against the running instance, tears
    # everything down. Catches UI regressions that pure
    # `cargo test` / `npm run build` can't see (Svelte effect
    # loops, state wiring, svelte-flow overlay rendering).
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build mm-server + mm-agent
        run: cargo build --bin mm-server --bin mm-agent

      - name: Build frontend (prod)
        working-directory: frontend
        run: npm run build

      - name: Stand up dev fixture
        # STAND_SKIP_FRONTEND — we already built `dist/` above;
        # the script would otherwise re-run `npm install`/build
        # and inflate the job by ~40s for no gain.
        env:
          STAND_SKIP_FRONTEND: '1'
        run: ./scripts/stand-up.sh

      - name: Run Playwright suite
        working-directory: frontend
        run: npm run test:e2e

      - name: Tear down stand
        if: always()
        run: ./scripts/tear-down.sh

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 14

      - name: Upload stand logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stand-logs
          path: .stand-run/logs
          retention-days: 14

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t market-maker .

