name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  otel-feature:
    name: OTel Feature Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Build + clippy with the `otel` feature on mm-server so a
      # regression that only surfaces with the opt-in OpenTelemetry
      # deps (opentelemetry-otlp + tracing-opentelemetry) is caught
      # on every PR — the default build skips these deps entirely.
      - run: cargo build -p mm-server --features otel
      - run: cargo clippy -p mm-server --features otel -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t market-maker .

  deploy-lint:
    name: Deploy manifests lint
    runs-on: ubuntu-latest
    # Keeps the shipped Helm chart, Prometheus alert rules,
    # Alertmanager config, and Grafana dashboard JSON from
    # drifting. Every check is a no-op if the corresponding
    # file is absent, so the job stays green even if we
    # reshuffle deploy/ in the future.
    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        run: |
          # helm
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          # promtool (bundled with prometheus docker image but we
          # need the standalone binary to run on the runner host).
          PROM_VERSION=2.53.0
          curl -fsSL "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz" \
            | tar -xz --strip-components=1 "prometheus-${PROM_VERSION}.linux-amd64/promtool"
          sudo mv promtool /usr/local/bin/
          promtool --version

      - name: Helm lint
        run: |
          if [ -d deploy/helm/mm ]; then
            helm lint deploy/helm/mm
            helm template release-test deploy/helm/mm > /dev/null
            helm template release-test deploy/helm/mm \
              -f deploy/helm/mm/values-dev.yaml > /dev/null
            helm template release-test deploy/helm/mm \
              -f deploy/helm/mm/values-prod.yaml > /dev/null
          else
            echo "no helm chart at deploy/helm/mm — skipping"
          fi

      - name: Prometheus rules lint
        run: |
          if [ -f deploy/prometheus/mm-alerts.yml ]; then
            promtool check rules deploy/prometheus/mm-alerts.yml
          fi
          if [ -f config/prometheus.yml ]; then
            # check config validates after the file references are
            # resolvable; run in a temp dir so the rule-file path
            # matches the in-container mount expected by prometheus.yml.
            tmp=$(mktemp -d)
            cp config/prometheus.yml "$tmp/prometheus.yml"
            mkdir -p "$tmp/etc/prometheus"
            cp deploy/prometheus/mm-alerts.yml "$tmp/etc/prometheus/mm-alerts.yml" || true
            # Rewrite the absolute mount path to a local one that
            # matches the tmp layout so promtool can actually find
            # the rule file it references.
            sed -i 's|/etc/prometheus/mm-alerts.yml|mm-alerts.yml|' "$tmp/prometheus.yml"
            cp deploy/prometheus/mm-alerts.yml "$tmp/mm-alerts.yml" || true
            (cd "$tmp" && promtool check config prometheus.yml)
          fi

      - name: Alertmanager config lint
        run: |
          if [ -f deploy/alertmanager/alertmanager.yml ]; then
            # alertmanager CLI is not distributed standalone the
            # same way promtool is; pull it from the docker image
            # via a one-shot docker run, avoiding a second tarball
            # download.
            docker pull prom/alertmanager:latest
            # envsubst substitutes `$VAR` refs with empty strings
            # so amtool can validate the YAML without requiring
            # real credentials.
            tmp=$(mktemp -d)
            envsubst < deploy/alertmanager/alertmanager.yml > "$tmp/alertmanager.yml"
            docker run --rm -v "$tmp:/cfg" prom/alertmanager:latest \
              --config.file=/cfg/alertmanager.yml --help >/dev/null 2>&1 || true
            # Use amtool for actual config validation.
            docker run --rm -v "$tmp:/cfg" --entrypoint /bin/amtool prom/alertmanager:latest \
              check-config /cfg/alertmanager.yml
          fi

      - name: Grafana dashboard JSON validation
        run: |
          if [ -d deploy/grafana/dashboards ]; then
            for f in deploy/grafana/dashboards/*.json; do
              python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f"
              echo "ok: $f"
            done
          fi

      - name: Docker-compose config validation
        run: |
          if [ -f docker-compose.yml ]; then
            docker compose -f docker-compose.yml config > /dev/null
          fi
