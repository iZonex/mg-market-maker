name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Engine
        - Strategy
        - Risk management
        - Exchange connector
        - Dashboard / API
        - Backtester
        - Configuration
        - New component
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? Why is it needed?
      placeholder: As a market maker operator, I need ... because ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical (blocking production deployment)
        - High (needed soon)
        - Medium (nice to have)
        - Low (someday)
