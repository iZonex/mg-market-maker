name: Bug Report
description: Report a bug in the market maker
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in as much detail as possible.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      options:
        - Engine (core market making loop)
        - Strategy (Avellaneda / GLFT / Grid)
        - Risk (kill switch / circuit breaker / inventory)
        - Exchange connector (Binance / Bybit / Custom)
        - Dashboard (HTTP API / WebSocket / Prometheus)
        - Backtester / Paper trading
        - Configuration / Startup
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (loss of funds / wrong orders)
        - High (system crash / can't trade)
        - Medium (incorrect data / degraded performance)
        - Low (cosmetic / minor inconvenience)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Set config to ...
        2. Run with MM_MODE=paper
        3. Wait for ...
        4. See error in logs

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error output
      description: Relevant log output or error messages
      render: shell

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `git describe --tags` or version tag
      placeholder: v0.3.0

  - type: dropdown
    id: mode
    attributes:
      label: Trading mode
      options:
        - Live
        - Paper
        - Backtest
        - N/A
